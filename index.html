<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Genshin Impact Wiki Reader - Kindle Compatible</title>

<style>
body{
    background:white;
    color:black;
    font-family:serif;
    margin:20px;
    line-height:1.5;
    font-size:18px;
}

input{
    width:260px;
    padding:6px;
    font-size:18px;
}

button{
    padding:8px 12px;
    margin:4px;
    font-size:18px;
}

img{
    display:none;
}

table{
    border-collapse:collapse;
    width:100%;
    display:block;
    overflow:auto;
    margin-top:10px;
    margin-bottom:10px;
}

td, th{
    border:1px solid black;
    padding:4px;
    vertical-align:top;
}

a{
    color:blue;
    cursor:pointer;
    text-decoration:underline;
}

.page{
    margin-top:30px;
}

.loading{
    color:gray;
}

.hidden{
    display:none;
}
</style>
</head>
<body>

<h1>Genshin Impact Wiki Reader</h1>

<input id="search" placeholder="Search page...">

<button id="searchButton" type="button">
Search
</button>

<button id="indexButton" type="button">
Load Wiki Index
</button>

<p id="status"></p>

<div id="content"></div>

<script type="text/javascript">
/*
Kindle-compatible version:
- No async / await
- No fetch()
- No const / let
- No arrow functions
- No inline onclick
- Uses XMLHttpRequest
*/

var API = "https://genshin-impact.fandom.com/api.php";

var content = document.getElementById("content");
var statusText = document.getElementById("status");
var searchInput = document.getElementById("search");
var searchButton = document.getElementById("searchButton");
var indexButton = document.getElementById("indexButton");

/* =========================
   BASIC AJAX
========================= */

function getJSON(url, callback){

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function(){

        if(xhr.readyState === 4){

            if(xhr.status >= 200 && xhr.status < 300){

                try{
                    var data = JSON.parse(xhr.responseText);
                    callback(null, data);
                }catch(e){
                    callback("Could not read response.", null);
                }

            }else{
                callback("Request failed. Status: " + xhr.status, null);
            }

        }

    };

    xhr.open("GET", url, true);
    xhr.send(null);

}

/* =========================
   SEARCH
========================= */

function searchPage(){

    var query = searchInput.value.replace(/^\s+|\s+$/g, "");

    if(!query){
        statusText.innerHTML = "Please enter a page name.";
        return;
    }

    statusText.innerHTML = "Searching...";

    var url =
        API +
        "?origin=*" +
        "&action=query" +
        "&list=search" +
        "&srsearch=" +
        encodeURIComponent(query) +
        "&format=json";

    getJSON(url, function(error, data){

        if(error){
            statusText.innerHTML = error;
            return;
        }

        if(
            !data.query ||
            !data.query.search ||
            data.query.search.length === 0
        ){
            statusText.innerHTML = "No results.";
            return;
        }

        var firstResult = data.query.search[0];

        content.innerHTML = "";

        loadPage(firstResult.title);

    });

}

/* =========================
   LOAD PAGE
========================= */

function loadPage(title){

    statusText.innerHTML = "Loading " + escapeHTML(title) + "...";

    var url =
        API +
        "?origin=*" +
        "&action=parse" +
        "&page=" +
        encodeURIComponent(title) +
        "&prop=text" +
        "&format=json";

    getJSON(url, function(error, data){

        if(error){
            statusText.innerHTML = error;
            return;
        }

        if(!data.parse){
            statusText.innerHTML = "Failed to load page.";
            return;
        }

        var html = data.parse.text["*"];

        var temp = document.createElement("div");
        temp.innerHTML = html;

        cleanPage(temp);

        var page = document.createElement("div");
        page.className = "page";

        var titleElement = document.createElement("h2");
        titleElement.appendChild(document.createTextNode(title));
        page.appendChild(titleElement);

        var body = document.createElement("div");
        body.innerHTML = temp.innerHTML;
        page.appendChild(body);

        content.innerHTML = "";
        content.appendChild(page);

        attachInternalLinks();

        window.scrollTo(0, 0);

        statusText.innerHTML = "Loaded: " + escapeHTML(title);

    });

}

/* =========================
   CLEAN PAGE
========================= */

function cleanPage(root){

    removeBySelector(root, ".mw-editsection");
    removeBySelector(root, ".toc");
    removeBySelector(root, ".navbox");
    removeBySelector(root, ".reflist");
    removeBySelector(root, ".reference");
    removeBySelector(root, "script");
    removeBySelector(root, "style");
    removeBySelector(root, ".error");
    removeBySelector(root, ".nomobile");
    removeBySelector(root, ".portable-infobox");
    removeBySelector(root, ".wds-global-navigation-wrapper");
    removeBySelector(root, ".fandom-community-header__background");
    removeBySelector(root, ".page__right-rail");
    removeBySelector(root, ".global-footer");
    removeBySelector(root, ".license-description");
    removeBySelector(root, ".noprint");
    removeBySelector(root, ".ambox");
    removeBySelector(root, ".notice");
    removeBySelector(root, ".shortdescription");
    removeBySelector(root, ".mw-cite-backlink");
    removeBySelector(root, ".reference-text");
    removeBySelector(root, ".audio-button");
    removeBySelector(root, ".tabber");
    removeBySelector(root, ".tabs");
    removeBySelector(root, ".gallery");
    removeBySelector(root, ".mw-parser-output > aside");

    var tables = root.getElementsByTagName("table");
    var i;

    for(i = 0; i < tables.length; i++){
        tables[i].style.display = "table";
        tables[i].style.visibility = "visible";
        tables[i].hidden = false;
    }

    var links = root.getElementsByTagName("a");

    for(i = 0; i < links.length; i++){

        var link = links[i];
        var title = link.getAttribute("title");
        var href = link.getAttribute("href");
        var text = link.textContent || link.innerText || "";
        var imgs = link.getElementsByTagName("img");

        if(imgs.length > 0 && text.replace(/^\s+|\s+$/g, "").length < 2 && title){
            link.innerHTML = escapeHTML(title);
        }

        if(href && href.indexOf("http") === 0){
            link.setAttribute("target", "_blank");
            continue;
        }

        var pageTitle = title;

        if(!pageTitle && href && href.indexOf("/wiki/") === 0){
            pageTitle = decodeURIComponent(href.replace("/wiki/", "")).replace(/_/g, " ");
        }

        if(pageTitle){
            link.setAttribute("href", "#");
            link.setAttribute("data-page-title", pageTitle);
        }

    }

    var images = root.getElementsByTagName("img");

    while(images.length > 0){
        images[0].parentNode.removeChild(images[0]);
    }

    var paragraphs = root.getElementsByTagName("p");

    for(i = paragraphs.length - 1; i >= 0; i--){
        var txt = paragraphs[i].textContent || paragraphs[i].innerText || "";
        if(txt.replace(/^\s+|\s+$/g, "") === ""){
            paragraphs[i].parentNode.removeChild(paragraphs[i]);
        }
    }

}

function removeBySelector(root, selector){

    if(!root.querySelectorAll){
        return;
    }

    var elements = root.querySelectorAll(selector);

    for(var i = elements.length - 1; i >= 0; i--){
        if(elements[i].parentNode){
            elements[i].parentNode.removeChild(elements[i]);
        }
    }

}

/* =========================
   INTERNAL LINK HANDLING
========================= */

function attachInternalLinks(){

    var links = content.getElementsByTagName("a");

    for(var i = 0; i < links.length; i++){

        var title = links[i].getAttribute("data-page-title");

        if(title){

            links[i].onclick = function(){

                var targetTitle = this.getAttribute("data-page-title");

                if(targetTitle){
                    loadPage(targetTitle);
                }

                return false;

            };

        }

    }

}

/* =========================
   LOAD WIKI INDEX
========================= */

function loadWikiIndex(){

    content.innerHTML = "";
    statusText.innerHTML = "Loading page list...";

    var pages = [];

    function loadBatch(apcontinue){

        var url =
            API +
            "?origin=*" +
            "&action=query" +
            "&list=allpages" +
            "&aplimit=500" +
            "&format=json";

        if(apcontinue){
            url += "&apcontinue=" + encodeURIComponent(apcontinue);
        }

        getJSON(url, function(error, data){

            if(error){
                statusText.innerHTML = error;
                return;
            }

            if(data.query && data.query.allpages){

                for(var i = 0; i < data.query.allpages.length; i++){
                    pages.push(data.query.allpages[i]);
                }

            }

            statusText.innerHTML = "Loaded " + pages.length + " page names...";

            if(data["continue"] && data["continue"].apcontinue){
                loadBatch(data["continue"].apcontinue);
            }else{
                showIndex(pages);
            }

        });

    }

    loadBatch("");

}

function showIndex(pages){

    content.innerHTML = "";

    for(var i = 0; i < pages.length; i++){

        var title = pages[i].title;

        var div = document.createElement("div");
        var link = document.createElement("a");

        link.appendChild(document.createTextNode(title));
        link.setAttribute("href", "#");
        link.setAttribute("data-page-title", title);

        div.appendChild(link);
        content.appendChild(div);

    }

    attachInternalLinks();

    statusText.innerHTML = "Wiki index loaded: " + pages.length + " pages.";

}

/* =========================
   UTILS
========================= */

function escapeHTML(text){

    return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");

}

/* =========================
   BUTTON EVENTS
========================= */

searchButton.onclick = function(){
    searchPage();
    return false;
};

indexButton.onclick = function(){
    loadWikiIndex();
    return false;
};

searchInput.onkeydown = function(e){

    e = e || window.event;

    var key = e.keyCode || e.which;

    if(key === 13){
        searchPage();
        return false;
    }

};

</script>

</body>
</html>
