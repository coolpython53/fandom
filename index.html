<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Genshin Impact Wiki Reader</title>

<style>
body{
    background:white;
    color:black;
    font-family:serif;
    margin:20px;
    line-height:1.5;
}

input{
    width:300px;
    padding:4px;
}

button{
    padding:4px 8px;
}

img{
    display:none;
}

table{
    border-collapse:collapse;
    width:100%;
    display:block;
    overflow:auto;
    margin-top:10px;
    margin-bottom:10px;
}

td, th{
    border:1px solid black;
    padding:4px;
    vertical-align:top;
}

a{
    color:blue;
    cursor:pointer;
    text-decoration:underline;
}

.page{
    margin-top:40px;
}

.loading{
    color:gray;
}

.hidden{
    display:none;
}
</style>
</head>
<body>

<h1>Genshin Impact Wiki Reader</h1>

<input
    id="search"
    placeholder="Search page..."
>

<button onclick="searchPage()">
Search
</button>

<button onclick="loadAllPages()">
Load Entire Wiki
</button>

<p id="status"></p>

<div id="content"></div>

<script>
const API =
"https://genshin-impact.fandom.com/api.php";

const content =
document.getElementById("content");

const statusText =
document.getElementById("status");

/* =========================
   SEARCH
========================= */

async function searchPage(){

    const query =
    document.getElementById("search")
    .value
    .trim();

    if(!query) return;

    statusText.textContent =
    "Searching...";

    const url =
    API +
    "?origin=*" +
    "&action=query" +
    "&list=search" +
    "&srsearch=" +
    encodeURIComponent(query) +
    "&format=json";

    const response =
    await fetch(url);

    const data =
    await response.json();

    if(
        !data.query ||
        !data.query.search ||
        data.query.search.length === 0
    ){
        statusText.textContent =
        "No results.";
        return;
    }

    const firstResult =
    data.query.search[0];

    content.innerHTML = "";

    await loadPage(firstResult.title);

    statusText.textContent =
    "Loaded: " +
    firstResult.title;
}

/* =========================
   LOAD PAGE
========================= */

async function loadPage(title){

    statusText.textContent =
    "Loading " + title + "...";

    const url =
    API +
    "?origin=*" +
    "&action=parse" +
    "&page=" +
    encodeURIComponent(title) +
    "&prop=text" +
    "&format=json";

    const response =
    await fetch(url);

    const data =
    await response.json();

    if(!data.parse){

        statusText.textContent =
        "Failed to load page.";

        return;
    }

    const html =
    data.parse.text["*"];

    const parser =
    new DOMParser();

    const doc =
    parser.parseFromString(
        html,
        "text/html"
    );

    cleanPage(doc);

    const page =
    document.createElement("div");

    page.className = "page";

    const titleElement =
    document.createElement("h2");

    titleElement.textContent =
    title;

    page.appendChild(titleElement);

    const body =
    document.createElement("div");

    body.innerHTML =
    doc.body.innerHTML;

    page.appendChild(body);

    content.innerHTML = "";

    content.appendChild(page);

    /* Attach internal link click handlers AFTER the page is inserted.
       This makes page links work correctly.
    */
    content.querySelectorAll("a[data-page-title]").forEach(link => {

        link.addEventListener("click", async function(e){

            e.preventDefault();

            const targetTitle =
            this.getAttribute("data-page-title");

            if(targetTitle){

                await loadPage(targetTitle);

            }

        });

    });

    window.scrollTo(0,0);

    statusText.textContent =
    "Loaded: " + title;
}

/* =========================
   CLEAN PAGE
========================= */

function cleanPage(doc){

    const remove = [

        ".mw-editsection",
        ".toc",
        ".navbox",
        ".reflist",
        ".reference",
        "script",
        "style",
        ".error",
        ".nomobile",
        ".portable-infobox",
        ".wds-global-navigation-wrapper",
        ".fandom-community-header__background",
        ".page__right-rail",
        ".global-footer",
        ".license-description",
        ".noprint",
        ".ambox",
        ".notice",
        ".shortdescription",
        ".mw-cite-backlink",
        ".reference-text",
        ".audio-button",
        ".tabber",
        ".tabs",
        ".gallery",
        ".mw-parser-output > aside"
    ];

    remove.forEach(selector => {

        doc.querySelectorAll(selector)
        .forEach(el => el.remove());

    });

    /* FORCE TABLES TO WORK */

    doc.querySelectorAll("table").forEach(table => {

        table.style.display = "table";
        table.style.visibility = "visible";
        table.hidden = false;

        table.removeAttribute("style");

        table.querySelectorAll("*")
        .forEach(el => {

            el.removeAttribute("style");

        });

    });

    /* REMOVE IMAGES BUT KEEP THEIR NAMES */

    doc.querySelectorAll("a").forEach(link => {

        const title =
        link.getAttribute("title");

        const text =
        link.textContent.trim();

        const hasImage =
        link.querySelector("img");

        /* ascension material fix */

        if(
            hasImage &&
            (
                !text ||
                text.length < 2
            ) &&
            title
        ){

            link.innerHTML = title;

        }

    });

    /* REMOVE ALL IMAGES */

    doc.querySelectorAll("img")
    .forEach(img => {

        img.remove();

    });

    /* INTERNAL LINKS
       Important:
       Do NOT attach onclick here because this document is later copied with innerHTML.
       Event handlers assigned in this temporary parsed document will be lost.
       Instead, store the target page title in data-page-title and attach clicks after insertion.
    */

    doc.querySelectorAll("a").forEach(link => {

        const title =
        link.getAttribute("title");

        const href =
        link.getAttribute("href");

        if(
            href &&
            href.startsWith("http")
        ){
            link.target = "_blank";
            return;
        }

        let pageTitle = title;

        if(
            !pageTitle &&
            href &&
            href.startsWith("/wiki/")
        ){
            pageTitle =
            decodeURIComponent(
                href.replace("/wiki/", "")
            ).replace(/_/g, " ");
        }

        if(pageTitle){

            link.href = "#";
            link.setAttribute("data-page-title", pageTitle);

        }

    });

    /* REMOVE EMPTY ELEMENTS */

    doc.querySelectorAll("p").forEach(p => {

        if(
            !p.textContent.trim()
        ){
            p.remove();
        }

    });

}

/* =========================
   LOAD ENTIRE WIKI
========================= */

async function loadAllPages(){

    content.innerHTML = "";

    statusText.textContent =
    "Loading page list...";

    let apcontinue = "";

    let pages = [];

    while(true){

        let url =
        API +
        "?origin=*" +
        "&action=query" +
        "&list=allpages" +
        "&aplimit=max" +
        "&format=json";

        if(apcontinue){

            url +=
            "&apcontinue=" +
            encodeURIComponent(apcontinue);

        }

        const response =
        await fetch(url);

        const data =
        await response.json();

        pages =
        pages.concat(
            data.query.allpages
        );

        if(data.continue){

            apcontinue =
            data.continue.apcontinue;

        }else{

            break;

        }

    }

    statusText.textContent =
    "Found " +
    pages.length +
    " pages.";

    content.innerHTML = "";

    for(
        let i = 0;
        i < pages.length;
        i++
    ){

        const title =
        pages[i].title;

        const div =
        document.createElement("div");

        const link =
        document.createElement("a");

        link.textContent =
        title;

        link.href = "#";

        link.onclick =
        async function(e){

            e.preventDefault();

            await loadPage(title);

        };

        div.appendChild(link);

        content.appendChild(div);

    }

    statusText.textContent =
    "Entire wiki index loaded.";

}

/* =========================
   ENTER KEY SEARCH
========================= */

document
.getElementById("search")
.addEventListener(
    "keydown",
    function(e){

        if(e.key === "Enter"){

            searchPage();

        }

    }
);
</script>

</body>
</html>
