<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Genshin Impact Wiki Reader - Kindle Compatible</title>

<style>
body{
    background:white;
    color:black;
    font-family:serif;
    margin:20px;
    line-height:1.5;
    font-size:18px;
}

input{
    width:260px;
    padding:6px;
    font-size:18px;
}

button{
    padding:8px 12px;
    margin:4px;
    font-size:18px;
}

/* AUTOCOMPLETE BOX */
#suggestions{
    border:1px solid black;
    max-width:260px;
    background:white;
    position:absolute;
    z-index:9999;
}

.suggestion{
    padding:6px;
    cursor:pointer;
    border-bottom:1px solid #ddd;
}

.suggestion:hover{
    background:#eee;
}

img{ display:none; }

table{
    border-collapse:collapse;
    width:100%;
    display:block;
    overflow:auto;
    margin-top:10px;
    margin-bottom:10px;
}

td, th{
    border:1px solid black;
    padding:4px;
    vertical-align:top;
}

a{
    color:blue;
    cursor:pointer;
    text-decoration:underline;
}

.page{ margin-top:30px; }

#top{ position:absolute; top:0; }

/* scroll button */
.scroll-top{
    position:fixed;
    right:16px;
    bottom:20px;
    width:44px;
    height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
    color:white;
    text-decoration:none;
    border-radius:50%;
    font-size:20px;
    opacity:0.75;
    z-index:9999;
}

</style>
</head>

<body>

<div id="top"></div>

<h1>Genshin Impact Wiki Reader</h1>

<input id="search" placeholder="Search page..." autocomplete="off">
<div id="suggestions"></div>

<button id="searchButton" type="button">Search</button>
<button id="indexButton" type="button">Load Wiki Index</button>

<p id="status"></p>
<div id="content"></div>

<a href="javascript:void(0);" class="scroll-top" onclick="scrollToTop(); return false;">↑</a>

<script type="text/javascript">

var API = "https://genshin-impact.fandom.com/api.php";

var content = document.getElementById("content");
var statusText = document.getElementById("status");
var searchInput = document.getElementById("search");
var searchButton = document.getElementById("searchButton");
var indexButton = document.getElementById("indexButton");
var suggestionsBox = document.getElementById("suggestions");

/* AJAX */
function getJSON(url, callback){
    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function(){
        if(xhr.readyState === 4){
            if(xhr.status >= 200 && xhr.status < 300){
                try{
                    callback(null, JSON.parse(xhr.responseText));
                }catch(e){
                    callback("Parse error", null);
                }
            }else{
                callback("Request failed", null);
            }
        }
    };

    xhr.open("GET", url, true);
    xhr.send(null);
}

/* SCROLL TO TOP */
function scrollToTop(){
    if(window.scrollTo){
        window.scrollTo(0,0);
    }

    document.body.scrollTop = 0;
    document.documentElement.scrollTop = 0;
}

/* FIX WIKI LINKS */
function fixWikiLinks(container){

    var links = container.getElementsByTagName("a");

    for(var i = 0; i < links.length; i++){

        links[i].onclick = function(){

            var href = this.getAttribute("href");

            if(!href){
                return false;
            }

            if(href.indexOf("/wiki/") === 0){
                var title = href.replace("/wiki/", "");
                title = title.split("#")[0];
                title = decodeURIComponent(title.replace(/_/g, " "));
                loadPage(title);
                return false;
            }

            return false;
        };
    }
}

/* AUTOCOMPLETE */
function showSuggestions(list){

    suggestionsBox.innerHTML = "";

    if(!list || list.length === 0){
        suggestionsBox.style.display = "none";
        return;
    }

    for(var i = 0; i < list.length; i++){

        (function(item){

            var div = document.createElement("div");
            div.className = "suggestion";
            div.innerHTML = item.title;

            div.onclick = function(){
                searchInput.value = item.title;
                suggestionsBox.style.display = "none";
                loadPage(item.title);
            };

            suggestionsBox.appendChild(div);

        })(list[i]);

    }

    suggestionsBox.style.display = "block";
}

/* LIVE SEARCH */
function updateSuggestions(){

    var q = searchInput.value.replace(/^\s+|\s+$/g, "");

    if(!q){
        suggestionsBox.style.display = "none";
        return;
    }

    var url =
        API +
        "?origin=*" +
        "&action=query" +
        "&list=search" +
        "&srlimit=5" +
        "&srsearch=" +
        encodeURIComponent(q) +
        "&format=json";

    getJSON(url, function(err, data){

        if(err || !data.query){
            return;
        }

        showSuggestions(data.query.search);

    });
}

/* SEARCH */
function searchPage(){

    var query = searchInput.value.replace(/^\s+|\s+$/g, "");

    if(!query){
        statusText.innerHTML = "Enter a page name.";
        return;
    }

    suggestionsBox.style.display = "none";

    var url =
        API +
        "?origin=*" +
        "&action=query" +
        "&list=search" +
        "&srsearch=" +
        encodeURIComponent(query) +
        "&format=json";

    getJSON(url, function(err, data){

        if(err || !data.query || !data.query.search.length){
            statusText.innerHTML = "No results.";
            return;
        }

        loadPage(data.query.search[0].title);

    });
}

/* LOAD PAGE */
function loadPage(title){

    statusText.innerHTML = "Loading " + title + "...";

    var url =
        API +
        "?origin=*" +
        "&action=parse" +
        "&page=" +
        encodeURIComponent(title) +
        "&prop=text&format=json";

    getJSON(url, function(err, data){

        if(err || !data.parse){
            statusText.innerHTML = "Load failed.";
            return;
        }

        var temp = document.createElement("div");
        temp.innerHTML = data.parse.text["*"];

        fixWikiLinks(temp);

        content.innerHTML = "<h2>" + title + "</h2>";
        content.appendChild(temp);

        scrollToTop();

        statusText.innerHTML = "Loaded: " + title;

    });
}

/* EVENTS */
searchButton.onclick = function(){
    searchPage();
    return false;
};

indexButton.onclick = function(){
    alert("Index unchanged in this version");
    return false;
};

searchInput.oninput = function(){
    updateSuggestions();
};

searchInput.onblur = function(){
    setTimeout(function(){
        suggestionsBox.style.display = "none";
    }, 200);
};

searchInput.onkeydown = function(e){
    e = e || window.event;
    if((e.keyCode || e.which) === 13){
        searchPage();
        return false;
    }
};

</script>

</body>
</html>
