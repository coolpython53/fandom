<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WikiPDF Creator</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
::-webkit-scrollbar{ width:6px; }
::-webkit-scrollbar-thumb{ background:#6366f1; border-radius:10px; }
</style>
</head>

<body class="bg-slate-950 text-white min-h-screen">

<div class="max-w-7xl mx-auto p-6">

  <div class="flex items-center justify-between mb-6">
    <h1 class="text-3xl font-black">WikiPDF Creator</h1>

    <button onclick="buildPdfBook()" id="btn-build" disabled class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-xl font-bold disabled:opacity-40">
      Export PDF
    </button>
  </div>

  <div class="bg-slate-900 rounded-2xl border border-slate-800 p-5 mb-6">
    <div class="flex gap-3">
      <input id="wiki-url" placeholder="https://fallout.fandom.com" class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 outline-none" />
      <button onclick="analyzeWiki()" class="bg-indigo-600 hover:bg-indigo-500 px-5 rounded-xl font-bold">Analyze Wiki</button>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

    <div class="bg-slate-900 rounded-2xl border border-slate-800 p-5">
      <h2 class="font-black text-lg mb-3">Wiki Pages</h2>
      <div id="scraped-pages-list" class="space-y-2 max-h-[500px] overflow-y-auto"></div>
    </div>

    <div class="bg-slate-900 rounded-2xl border border-slate-800 p-5">
      <h2 class="font-black text-lg mb-3">PDF Chapters</h2>
      <div id="compilation-list"></div>
    </div>

  </div>

  <div class="bg-slate-900 rounded-2xl border border-slate-800 p-6 mt-6">
    <h2 class="text-2xl font-black mb-6">Live Preview</h2>

    <div class="bg-white text-black rounded-xl p-10" id="print-sandbox-document">
      <div id="wiki-pages-container"></div>
    </div>
  </div>

</div>

<script>
let currentApiUrl = "";
let wikiPagesFound = [];
let addedPagesQueue = [];

function jsonp(url, params, cb){
  const cbName = "cb_" + Math.random();
  window[cbName] = (d)=>{ delete window[cbName]; document.body.removeChild(s); cb(d); };
  params.callback = cbName;
  params.format = "json";
  const q = Object.entries(params).map(([k,v])=>k+"="+encodeURIComponent(v)).join("&");
  const s = document.createElement("script");
  s.src = url+"?"+q;
  document.body.appendChild(s);
}

function analyzeWiki(){
  const input = document.getElementById("wiki-url").value.trim();
  const url = new URL(input.startsWith("http")?input:"https://"+input);
  const sub = url.hostname.split(".")[0];
  currentApiUrl = `https://${sub}.fandom.com/api.php`;
  fetchWikiListings();
}

function fetchWikiListings(){
  jsonp(currentApiUrl,{action:"query",list:"allpages",aplimit:50},res=>{
    wikiPagesFound = (res.query?.allpages||[]).map(p=>({title:p.title}));
    renderExplorer();
  });
}

function renderExplorer(){
  const el = document.getElementById("scraped-pages-list");
  el.innerHTML = wikiPagesFound.map(p=>`
    <div class='p-2 bg-slate-950 rounded'>
      <button onclick="fetchPage('${p.title.replace(/'/g,"\'")}')">${p.title}</button>
    </div>
  `).join("");
}

function fetchPage(title){
  jsonp(currentApiUrl,{action:"parse",page:title,prop:"text"},res=>{
    const html = res.parse.text["*"];
    const doc = new DOMParser().parseFromString(html,"text/html");
    const root = doc.querySelector(".mw-parser-output");
    if(!root) return;

    const blocks=[];
    root.querySelectorAll("p").forEach(p=>{
      const t=p.textContent.trim();
      if(t.length>40) blocks.push({type:"p",text:t});
    });

    const images=[];
    root.querySelectorAll("img").forEach(i=>{
      let src=i.src; if(src && images.length<4) images.push(src);
    });

    addedPagesQueue.push({title,blocks,images});
    renderQueue();
    renderPreview();
  });
}

function renderQueue(){
  document.getElementById("compilation-list").innerHTML = addedPagesQueue.map((p,i)=>`
    <div class='p-2 bg-slate-950 mb-2 rounded'>
      ${p.title} <button onclick='addedPagesQueue.splice(${i},1);renderQueue();renderPreview()'>X</button>
    </div>
  `).join("");
}

function renderPreview(){
  const el = document.getElementById("wiki-pages-container");
  el.innerHTML = addedPagesQueue.map(p=>`
    <div class='mb-10'>
      <h2 class='text-2xl font-bold'>${p.title}</h2>
      ${(p.images||[]).map(i=>`<img src='${i}' style='width:200px'/>`).join("")}
      ${(p.blocks||[]).map(b=>`<p>${b.text}</p>`).join("")}
    </div>
  `).join("");
}

// ✅ FIXED PDF ENGINE (MULTI PAGE)
async function buildPdfBook(){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  const pageW = 595.28;
  const pageH = 841.89;

  const temp = document.createElement("div");
  temp.style.position="absolute";
  temp.style.left="-99999px";
  temp.style.width="800px";
  document.body.appendChild(temp);

  for(const page of addedPagesQueue){
    temp.innerHTML = renderSingle(page);
    const canvas = await html2canvas(temp,{scale:2,useCORS:true});
    const img = canvas.toDataURL("image/jpeg",1.0);

    let imgH = (canvas.height*pageW)/canvas.width;
    let pos = 0;

    pdf.addImage(img,"JPEG",0,pos,pageW,imgH);

    let left = imgH-pageH;
    while(left>0){
      pos = left-imgH;
      pdf.addPage();
      pdf.addImage(img,"JPEG",0,pos,pageW,imgH);
      left -= pageH;
    }

    pdf.addPage();
  }

  document.body.removeChild(temp);
  pdf.save("WikiBook.pdf");
}

function renderSingle(p){
  return `<div style='font-family:Arial;padding:40px'>
    <h1>${p.title}</h1>
    ${(p.images||[]).map(i=>`<img src='${i}' style='width:100%'/>`).join("")}
    ${(p.blocks||[]).map(b=>`<p>${b.text}</p>`).join("")}
  </div>`;
}

</script>

</body>
</html>
